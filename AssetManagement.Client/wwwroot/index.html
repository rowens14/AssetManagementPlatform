<!--
    FILE:    index.html
    PROJECT: AssetManagement.Client / wwwroot
    PURPOSE: The single HTML page that hosts the Blazor WebAssembly application.
             The browser loads this file once; after that, all navigation is handled
             client-side by Blazor without full page reloads. Contains the <div id="app">
             mount point where App.razor renders, loads app.css for styling, and
             includes the blazor.webassembly.js bootstrap script that downloads and
             starts the .NET 10 WASM runtime. Also shows a plain-text loading message
             while the WASM bundle is being fetched on first load.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASSET_MGR — Law Firm Asset Management</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
</head>
<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:'DM Sans',sans-serif;color:#9ca3af;gap:10px;">
            <div style="width:18px;height:18px;border:2.5px solid #e3e6ea;border-top-color:#1a2332;border-radius:50%;animation:spin .7s linear infinite;"></div>
            Loading…
            <style>@keyframes spin{to{transform:rotate(360deg);}}</style>
        </div>
    </div>
    <div id="blazor-error-ui" style="display:none;">
        An error occurred. <a href="">Reload</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
